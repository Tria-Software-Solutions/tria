<svg viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- API endpoint illustration - SafeData -->

  <!-- Subtle grid -->
  <g stroke="#068e8c" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Small decorative globe dots -->
  <g fill="#068e8c" opacity="0.06">
    <circle cx="160" cy="80" r="1.5"/>
    <circle cx="240" cy="120" r="1"/>
    <circle cx="120" cy="160" r="1"/>
    <circle cx="200" cy="200" r="1.5"/>
    <circle cx="140" cy="280" r="1"/>
    <circle cx="220" cy="340" r="1"/>
    <circle cx="640" cy="80" r="1"/>
    <circle cx="700" cy="140" r="1.5"/>
    <circle cx="660" cy="220" r="1"/>
    <circle cx="720" cy="300" r="1"/>
    <circle cx="600" cy="360" r="1.5"/>
  </g>

  <!-- API Endpoint -->
  <g>
    <!-- Method badge -->
    <rect x="140" y="120" width="44" height="22" rx="4" fill="none" stroke="#068e8c" stroke-width="0.8" opacity="0.25"/>
    <text x="162" y="135" fill="#068e8c" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">GET</text>

    <!-- Endpoint path -->
    <text x="194" y="135" fill="rgba(255,255,255,0.5)" font-family="ui-monospace, monospace" font-size="9" dominant-baseline="middle">/api/v1/score</text>

    <!-- Query params hint -->
    <text x="194" y="155" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">?lat=9.935&lng=-84.088</text>
  </g>

  <!-- Arrow pointing down to response -->
  <path d="M162 180 L162 210" stroke="#068e8c" stroke-width="0.8" opacity="0.15" fill="none"/>
  <path d="M154 204 L162 216 L170 204" stroke="#068e8c" stroke-width="0.8" opacity="0.15" fill="none"/>

  <!-- Response JSON -->
  <g>
    <text x="140" y="240" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">{</text>
    <text x="152" y="256" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "score": <tspan fill="#068e8c" opacity="0.5">0.87</tspan></text>
    <text x="152" y="270" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "confidence": <tspan fill="#068e8c" opacity="0.5">0.92</tspan></text>
    <text x="152" y="284" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "lighting": <tspan fill="#068e8c" opacity="0.5">0.78</tspan></text>
    <text x="152" y="298" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "crime_risk": <tspan fill="#068e8c" opacity="0.5">0.12</tspan></text>
    <text x="140" y="314" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">}</text>
  </g>

  <!-- Divider line -->
  <line x1="440" y1="80" x2="440" y2="360" stroke="#068e8c" stroke-width="0.3" opacity="0.06"/>

  <!-- Right side: Data sources legend -->
  <g>
    <text x="480" y="135" fill="rgba(255,255,255,0.2)" font-family="system-ui" font-size="7" letter-spacing="0.5">DATA SOURCES</text>
    
    <line x1="480" y1="148" x2="600" y2="148" stroke="#068e8c" stroke-width="0.3" opacity="0.06"/>
    
    <circle cx="485" cy="168" r="2" fill="#068e8c" opacity="0.3"/>
    <text x="495" y="172" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">ACLED crime events</text>
    
    <circle cx="485" cy="192" r="2" fill="#068e8c" opacity="0.3"/>
    <text x="495" y="196" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">NASA VIIRS satellite</text>
    
    <circle cx="485" cy="216" r="2" fill="#068e8c" opacity="0.3"/>
    <text x="495" y="220" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">OpenStreetMap</text>

    <circle cx="485" cy="240" r="2" fill="#068e8c" opacity="0.3"/>
    <text x="495" y="244" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">Citizen reports</text>

    <line x1="480" y1="260" x2="600" y2="260" stroke="#068e8c" stroke-width="0.3" opacity="0.06"/>

    <text x="480" y="280" fill="rgba(255,255,255,0.12)" font-family="ui-monospace, monospace" font-size="7">137 countries indexed</text>
  </g>

  <!-- Title -->
  <text x="400" y="38" fill="#068e8c" font-family="system-ui" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1.5">SAFEDATA API</text>
  <text x="400" y="55" fill="rgba(255,255,255,0.1)" font-family="system-ui" font-size="7" text-anchor="middle" letter-spacing="0.5">Safety Scoring · Geospatial Data Aggregation</text>
</svg>
