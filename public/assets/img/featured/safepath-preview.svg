<svg viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- API endpoint illustration - SafePath -->

  <!-- Subtle grid -->
  <g stroke="#068e8c" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Decorative route nodes -->
  <g fill="#068e8c" opacity="0.04">
    <circle cx="120" cy="100" r="2"/>
    <circle cx="200" cy="140" r="1.5"/>
    <circle cx="160" cy="220" r="1"/>
    <circle cx="280" cy="180" r="1.5"/>
    <circle cx="100" cy="340" r="1.5"/>
    <circle cx="680" cy="100" r="1.5"/>
    <circle cx="720" cy="180" r="1"/>
    <circle cx="660" cy="280" r="2"/>
    <circle cx="740" cy="340" r="1"/>
  </g>

  <!-- API Endpoint -->
  <g>
    <!-- Method badge -->
    <rect x="140" y="100" width="52" height="22" rx="4" fill="none" stroke="#068e8c" stroke-width="0.8" opacity="0.25"/>
    <text x="166" y="115" fill="#068e8c" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">POST</text>

    <!-- Endpoint path -->
    <text x="202" y="115" fill="rgba(255,255,255,0.5)" font-family="ui-monospace, monospace" font-size="9" dominant-baseline="middle">/api/v1/route</text>

    <!-- Request body hint -->
    <text x="202" y="135" fill="rgba(255,255,255,0.12)" font-family="ui-monospace, monospace" font-size="7">{"origin": {...}, "destination": {...}}</text>
  </g>

  <!-- Arrow down -->
  <path d="M166 160 L166 190" stroke="#068e8c" stroke-width="0.8" opacity="0.15" fill="none"/>
  <path d="M158 184 L166 196 L174 184" stroke="#068e8c" stroke-width="0.8" opacity="0.15" fill="none"/>

  <!-- Response JSON -->
  <g>
    <text x="140" y="220" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">{</text>
    <text x="152" y="236" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "safety_score": <tspan fill="#068e8c" opacity="0.5">0.91</tspan></text>
    <text x="152" y="250" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "distance_km": <tspan fill="#068e8c" opacity="0.5">3.2</tspan></text>
    <text x="152" y="264" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "duration_min": <tspan fill="#068e8c" opacity="0.5">28</tspan></text>
    <text x="152" y="278" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  "segments": [</text>
    <text x="164" y="292" fill="rgba(255,255,255,0.1)" font-family="ui-monospace, monospace" font-size="7">{"lat": 9.935, "lng": -84.088},</text>
    <text x="164" y="306" fill="rgba(255,255,255,0.1)" font-family="ui-monospace, monospace" font-size="7">{"lat": 9.940, "lng": -84.072}</text>
    <text x="152" y="320" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">  ]</text>
    <text x="140" y="336" fill="rgba(255,255,255,0.2)" font-family="ui-monospace, monospace" font-size="7">}</text>
  </g>

  <!-- Divider -->
  <line x1="460" y1="80" x2="460" y2="360" stroke="#068e8c" stroke-width="0.3" opacity="0.06"/>

  <!-- Right side: Routing pipeline -->
  <g>
    <text x="500" y="115" fill="rgba(255,255,255,0.2)" font-family="system-ui" font-size="7" letter-spacing="0.5">ROUTING PIPELINE</text>
    <line x1="500" y1="128" x2="660" y2="128" stroke="#068e8c" stroke-width="0.3" opacity="0.06"/>

    <!-- Pipeline steps -->
    <circle cx="505" cy="150" r="2" fill="#068e8c" opacity="0.25"/>
    <text x="515" y="154" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">OSM graph fetch</text>

    <path d="M524 162 L524 172" stroke="#068e8c" stroke-width="0.5" opacity="0.08" fill="none"/>

    <circle cx="505" cy="182" r="2" fill="#068e8c" opacity="0.25"/>
    <text x="515" y="186" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">Edge weight mixing</text>

    <path d="M524 194 L524 204" stroke="#068e8c" stroke-width="0.5" opacity="0.08" fill="none"/>

    <circle cx="505" cy="214" r="2" fill="#068e8c" opacity="0.25"/>
    <text x="515" y="218" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">A* pathfinding</text>

    <path d="M524 226 L524 236" stroke="#068e8c" stroke-width="0.5" opacity="0.08" fill="none"/>

    <circle cx="505" cy="246" r="2" fill="#068e8c" opacity="0.25"/>
    <text x="515" y="250" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">Safety scoring</text>

    <path d="M524 258 L524 268" stroke="#068e8c" stroke-width="0.5" opacity="0.08" fill="none"/>

    <circle cx="505" cy="278" r="2" fill="#068e8c" opacity="0.25"/>
    <text x="515" y="282" fill="rgba(255,255,255,0.15)" font-family="ui-monospace, monospace" font-size="7">Route response</text>
  </g>

  <!-- Title -->
  <text x="400" y="38" fill="#068e8c" font-family="system-ui" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1.5">SAFEPATH API</text>
  <text x="400" y="55" fill="rgba(255,255,255,0.1)" font-family="system-ui" font-size="7" text-anchor="middle" letter-spacing="0.5">Intelligent Routing · Safety-Optimized Paths</text>
</svg>
